<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="10; url=index.html" />
<title>404 - Page Not Found | Nathansoftware</title>
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #0f172a;
    color: white;
    line-height: 1.6;
    overflow-x: hidden;
}

a {
    text-decoration: none;
    color: inherit;
}

.container {
    width: 92%;
    max-width: 1250px;
    margin: auto;
}

header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(2, 6, 23, 0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 0;
}

.logo {
    font-size: 30px;
    font-weight: bold;
    color: #38bdf8;
}

.nav-links {
    display: flex;
    gap: 28px;
}

.nav-links a {
    color: #cbd5e1;
    transition: 0.2s;
}

.nav-links a:hover {
    color: #38bdf8;
}

.error-section {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background:
        linear-gradient(rgba(15,23,42,0.82), rgba(15,23,42,0.94)),
        url('https://cdn.jsdelivr.net/gh/Nathan-R1/Website-Assets@main/assets/hero.jpg') center/cover;
}

.error-content {
    padding: 60px 20px;
}

.error-code {
    font-size: clamp(100px, 20vw, 200px);
    font-weight: 900;
    line-height: 1;
    color: #38bdf8;
    text-shadow: 0 0 60px rgba(56, 189, 248, 0.3);
}

.error-content h2 {
    font-size: clamp(24px, 4vw, 40px);
    margin: 16px 0 12px;
}

.error-content p {
    max-width: 520px;
    margin: 0 auto 36px;
    color: #cbd5e1;
    font-size: clamp(15px, 2vw, 19px);
}

.button {
    display: inline-block;
    background: #38bdf8;
    color: #0f172a;
    padding: 14px 36px;
    border-radius: 0;
    font-weight: bold;
    transition: 0.2s;
    font-size: 16px;
    text-align: center;
}

.button:hover {
    transform: translateY(-3px);
    background: #7dd3fc;
}

footer {
    background: #020617;
    padding: 50px 0;
    text-align: center;
    color: #94a3b8;
    border-top: 1px solid rgba(255,255,255,0.05);
}

@media(max-width: 700px) {
    nav {
        flex-direction: column;
        gap: 16px;
    }

    .nav-links {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
    }

}
}

</style>
</head>
<body>

<header>
    <div class="container">
        <nav>
            <div class="logo">
                <img src="https://cdn.jsdelivr.net/gh/Nathan-R1/Website-Assets@main/assets/logo.png" alt="Nathansoftware" style="height: 48px; width: auto; display: block;">
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="downloads.html">Downloads</a>
                <a href="index.html#about">About</a>
                <a href="index.html#work">Work</a>
                <a href="index.html#news">News</a>
            </div>
        </nav>
    </div>
</header>

<section class="error-section">
    <div class="container error-content">
        <div class="error-code">404</div>
        <h2>Page Not Found</h2>
        <p>
            The page you are looking for doesn't exist, has been moved,
            or is temporarily unavailable.
        </p>
        <a href="index.html" class="button">Back to Home</a>
    </div>
</section>

<footer>
    <div class="container">
        <p>&copy; 2026 Nathansoftware. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
